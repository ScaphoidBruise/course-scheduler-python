<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Catalog — UTPB Scheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg main-nav">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/"><span class="brand-accent">UTPB</span> Scheduler</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/catalog">Catalog</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profile">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="/progress">Progress</a></li>
                    <li class="nav-item"><a class="nav-link" href="/planner">Planner</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/help">Help</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link account-link" href="/account">Account</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="content-area">
        <div class="container-fluid px-4 py-3">
            <h4 class="mb-3">Course Catalog</h4>

            <div class="row g-2 mb-3 align-items-end">
                <div class="col-auto">
                    <label class="filter-label">Subject</label>
                    <select id="subjectSelect" class="form-select form-select-sm">
                        <option value="">All</option>
                    </select>
                </div>
                <div class="col-auto">
                    <label class="filter-label">Level</label>
                    <select id="levelSelect" class="form-select form-select-sm">
                        <option value="">All</option>
                        <option value="1">1xxx</option>
                        <option value="2">2xxx</option>
                        <option value="3">3xxx</option>
                        <option value="4">4xxx</option>
                    </select>
                </div>
                <div class="col-auto">
                    <label class="filter-label">Typical term</label>
                    <select id="termSelect" class="form-select form-select-sm">
                        <option value="">All</option>
                        <option value="Spring">Spring</option>
                        <option value="Summer">Summer</option>
                        <option value="Fall">Fall</option>
                    </select>
                </div>
                <div class="col-auto">
                    <label class="filter-label">Search</label>
                    <input type="text" id="searchInput" class="form-control form-control-sm"
                           placeholder="Code or name...">
                </div>
                <div class="col-auto">
                    <button id="filterBtn" class="btn btn-accent btn-sm">Filter</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-sm table-hover section-table align-middle">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Course Name</th>
                            <th>Prerequisites</th>
                            <th>Term (inferred)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="courseBody"></tbody>
                </table>
            </div>
            <p class="text-muted small" id="courseCount"></p>
        </div>
    </div>

    <div class="modal fade" id="courseDetailModal" tabindex="-1" aria-labelledby="courseDetailTitle" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="courseDetailTitle">Course detail</h5>
                        <p class="text-muted small mb-0" id="courseDetailCode"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="courseDetailAlert" class="alert alert-danger py-2 d-none"></div>
                    <div class="catalog-detail-summary mb-3">
                        <div class="mb-2">
                            <span class="fw-semibold">Prerequisites:</span>
                            <span id="courseDetailPrereqs">—</span>
                        </div>
                        <div>
                            <span class="fw-semibold">Catalog link:</span>
                            <span id="courseDetailUrl">—</span>
                        </div>
                    </div>
                    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-2">
                        <h6 class="mb-0">Sections across all terms</h6>
                        <button type="button" id="detailWishlistBtn" class="btn btn-outline-accent btn-sm">Add to wishlist</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-sm table-hover section-table catalog-detail-table align-middle">
                            <thead>
                                <tr>
                                    <th>Term</th>
                                    <th>Section</th>
                                    <th>Days</th>
                                    <th>Time</th>
                                    <th>Mode</th>
                                    <th>Location</th>
                                    <th>Dates</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="courseDetailSections"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/catalog.js"></script>
</body>
</html>
