<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account — UTPB Scheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg main-nav">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/"><span class="brand-accent">UTPB</span> Scheduler</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="/catalog">Catalog</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profile">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/help">Help</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link account-link active" href="/account">Account</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="content-area">
        <div class="container-fluid px-4 py-3">
            <div class="row justify-content-center g-3">
                <div class="col-lg-6">
                    <div class="card p-3 shadow-sm">
                        <h5 id="authTitle" class="mb-2">Login</h5>
                        <p id="authSubtitle" class="text-muted small">Sign in to access your personal schedule profile.</p>

                        <form id="loginForm">
                            <div class="mb-2">
                                <label class="form-label mb-1">Username</label>
                                <input id="loginUsername" class="form-control" required minlength="3">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-1">Password</label>
                                <div class="input-group">
                                    <input id="loginPassword" type="password" class="form-control" required minlength="8">
                                    <button class="btn btn-outline-secondary" type="button" id="toggleLoginPassword" aria-label="Toggle password visibility">&#128065;</button>
                                </div>
                            </div>
                            <button class="btn btn-accent w-100" type="submit">Login</button>
                            <p class="small text-muted mt-2 mb-0 text-center">
                                New user?
                                <a href="#" id="showRegisterLink">Register here</a>
                            </p>
                        </form>

                        <form id="registerForm" class="d-none">
                            <div class="mb-2">
                                <label class="form-label mb-1">Username</label>
                                <input id="registerUsername" class="form-control" required minlength="3">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-1">Password</label>
                                <div class="input-group">
                                    <input id="registerPassword" type="password" class="form-control" required minlength="8">
                                    <button class="btn btn-outline-secondary" type="button" id="toggleRegisterPassword" aria-label="Toggle password visibility">&#128065;</button>
                                </div>
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-1">Confirm Password</label>
                                <div class="input-group">
                                    <input id="registerPasswordConfirm" type="password" class="form-control" required minlength="8">
                                    <button class="btn btn-outline-secondary" type="button" id="toggleRegisterPasswordConfirm" aria-label="Toggle password visibility">&#128065;</button>
                                </div>
                            </div>
                            <button class="btn btn-outline-accent w-100" type="submit">Register</button>
                            <p class="small text-muted mt-2 mb-0 text-center">
                                Already have an account?
                                <a href="#" id="showLoginLink">Login here</a>
                            </p>
                        </form>
                    </div>
                </div>
                <div class="col-lg-10">
                    <div class="d-flex justify-content-between align-items-center gap-2">
                        <div id="accountStatus" class="alert alert-secondary d-none mb-0 flex-grow-1"></div>
                        <button id="logoutBtn" class="btn btn-outline-danger d-none" type="button">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/account.js"></script>
</body>
</html>
