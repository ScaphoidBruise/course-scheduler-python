<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule — UTPB Scheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg main-nav">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/"><span class="brand-accent">UTPB</span> Scheduler</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="/catalog">Catalog</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/help">Help</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link account-link" href="/account">Account</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="content-area">
        <div class="container-fluid px-4 py-3">
            <div id="alertBox"></div>

            <div class="row g-3">
                <!-- LEFT: Section Picker -->
                <div class="col-lg-4 col-xl-3">
                    <div class="picker-panel">
                        <div class="mb-2">
                            <label class="filter-label">Term</label>
                            <select id="termSelect" class="form-select form-select-sm"></select>
                        </div>
                        <div id="termDates" class="term-date-banner d-none"></div>
                        <div class="mb-2">
                            <label class="filter-label">Search</label>
                            <input type="text" id="searchInput" class="form-control form-control-sm"
                                   placeholder="Course code or name...">
                        </div>
                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <label class="filter-label">Level</label>
                                <select id="levelSelect" class="form-select form-select-sm">
                                    <option value="">All</option>
                                    <option value="1">1xxx</option>
                                    <option value="2">2xxx</option>
                                    <option value="3">3xxx</option>
                                    <option value="4">4xxx</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="filter-label">Subject</label>
                                <select id="subjectSelect" class="form-select form-select-sm">
                                    <option value="">All</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="filter-label">Mode</label>
                            <select id="modeSelect" class="form-select form-select-sm">
                                <option value="">All</option>
                            </select>
                        </div>
                        <button id="filterBtn" class="btn btn-accent btn-sm w-100">Filter</button>

                        <hr class="my-2">

                        <div id="sectionResults" class="section-results">
                            <p class="text-muted small">Select a term to see sections.</p>
                        </div>
                    </div>
                </div>

                <!-- RIGHT: Calendar + Added List -->
                <div class="col-lg-8 col-xl-9">
                    <div id="summaryBar" class="d-flex justify-content-between align-items-center mb-2">
                        <div>
                            <span class="fw-bold" id="termLabel"></span>
                            <span class="mx-1 text-muted">&middot;</span>
                            <span class="fw-bold" id="sectionCount">0</span>
                            <span class="text-muted small">sections</span>
                            <span class="mx-1 text-muted">&middot;</span>
                            <span class="fw-bold" id="creditCount">0.0</span>
                            <span class="text-muted small">credit hrs</span>
                            <span id="conflictBadge" class="mx-1 d-none">
                                <span class="mx-1 text-muted">&middot;</span>
                                <span class="text-danger fw-bold small" id="conflictText"></span>
                            </span>
                        </div>
                        <button id="clearBtn" class="btn btn-outline-danger btn-sm d-none">Clear All</button>
                    </div>

                    <div class="grid-wrapper">
                        <div class="weekly-grid" id="weeklyGrid"></div>
                    </div>

                    <div id="addedTableWrap" class="mt-3 d-none">
                        <h6>Added Sections</h6>
                        <div class="table-responsive">
                            <table class="table table-sm section-table align-middle">
                                <thead>
                                    <tr>
                                        <th></th><th>Course</th><th>Title</th><th>&sect;</th>
                                        <th>Session</th><th>Dates</th><th>Days</th><th>Time</th>
                                        <th>Location</th><th>Mode</th><th>Hrs</th><th></th>
                                    </tr>
                                </thead>
                                <tbody id="addedBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/schedule.js"></script>
</body>
</html>
